<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>答题系统</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf7f2;
  --card: #ffffff;
  --text: #2c2416;
  --text-secondary: #8b8068;
  --ink: #1e293b;
  --accent: #c4924a;
  --accent-light: #f5e6d3;
  --gold: #b8860b;
  --correct: #2d8a56;
  --correct-bg: #edf7f1;
  --incorrect: #c0392b;
  --incorrect-bg: #fdf0ef;
  --border: #e8e0d5;
  --shadow: 0 2px 16px rgba(44,36,22,0.06);
  --shadow-lg: 0 8px 40px rgba(44,36,22,0.1);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", "Hiragino Sans GB", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(ellipse at 20% 20%, rgba(196,146,74,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(46,125,50,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(30,41,59,0.02) 0%, transparent 70%);
}

/* ── Typography ── */
h1, h2, h3, .font-display {
  font-family: "Playfair Display", "PingFang SC", "Microsoft YaHei", serif;
  font-weight: 600;
  letter-spacing: -0.01em;
  color: var(--ink);
}

/* ── Container ── */
.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 40px 24px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* ── Header ── */
.app-header {
  text-align: center;
  margin-bottom: 48px;
}
.app-header h1 {
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--ink) 0%, #3d4f66 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.app-header .subtitle {
  font-size: 0.95rem;
  color: var(--text-secondary);
  font-style: italic;
  font-family: "Playfair Display", serif;
}

/* ── Cards ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 40px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  transition: var(--transition);
}
.card:hover { box-shadow: var(--shadow-lg); }

/* ── Buttons ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 32px;
  border: none;
  border-radius: 50px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
  letter-spacing: 0.01em;
  outline: none;
  position: relative;
  overflow: hidden;
}
.btn-primary {
  background: var(--ink);
  color: #fff;
}
.btn-primary:hover {
  background: #2d3f55;
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(30,41,59,0.25);
}
.btn-secondary {
  background: var(--card);
  color: var(--ink);
  border: 1.5px solid var(--border);
}
.btn-secondary:hover {
  border-color: var(--ink);
  background: #faf9f7;
}
.btn-accent {
  background: var(--accent);
  color: #fff;
}
.btn-accent:hover {
  background: #b07d35;
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(196,146,74,0.3);
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
}
.btn-sm { padding: 8px 20px; font-size: 0.875rem; }

/* ── Upload Page ── */
.drop-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 60px 40px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  background: #fdfcfa;
  position: relative;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--accent);
  background: var(--accent-light);
}
.drop-zone .icon {
  font-size: 3rem;
  margin-bottom: 16px;
  opacity: 0.6;
}
.drop-zone h3 {
  font-size: 1.2rem;
  margin-bottom: 6px;
  color: var(--ink);
}
.drop-zone p {
  font-size: 0.9rem;
  color: var(--text-secondary);
}
.drop-zone input[type="file"] { display: none; }

.format-hints {
  display: flex;
  gap: 12px;
  margin-top: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
.format-badge {
  display: inline-block;
  padding: 6px 14px;
  background: var(--accent-light);
  color: var(--accent);
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 500;
}

.paste-section {
  margin-top: 24px;
  border-top: 1px solid var(--border);
  padding-top: 24px;
}
.paste-section summary {
  cursor: pointer;
  color: var(--text-secondary);
  font-size: 0.9rem;
  user-select: none;
}
.paste-section summary:hover { color: var(--ink); }
.paste-section textarea {
  width: 100%;
  min-height: 200px;
  margin-top: 16px;
  padding: 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-family: inherit;
  font-size: 0.95rem;
  resize: vertical;
  background: #fdfcfa;
  transition: var(--transition);
  line-height: 1.8;
}
.paste-section textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(196,146,74,0.1);
}
.paste-section .btn { margin-top: 12px; }

.question-preview {
  margin-top: 24px;
  max-height: 300px;
  overflow-y: auto;
  padding: 20px;
  background: #fdfcfa;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
}
.question-preview h4 {
  margin-bottom: 12px;
  color: var(--ink);
  font-size: 0.95rem;
}
.preview-item {
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.875rem;
  color: var(--text-secondary);
  display: flex;
  gap: 8px;
}
.preview-item:last-child { border-bottom: none; }
.preview-item .q-num {
  color: var(--accent);
  font-weight: 600;
  min-width: 28px;
}
.preview-item .q-badge {
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--accent-light);
  color: var(--accent);
  margin-left: 8px;
  white-space: nowrap;
  font-weight: 500;
}
.preview-stats {
  margin-top: 20px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.preview-stat {
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.preview-stat strong {
  color: var(--ink);
  font-family: "Playfair Display", serif;
  font-size: 1.1rem;
}

.file-name {
  margin-top: 12px;
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 500;
}
.error-msg {
  margin-top: 12px;
  padding: 12px 16px;
  background: var(--incorrect-bg);
  color: var(--incorrect);
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  display: none;
}

/* ── Quiz Page ── */
#quiz-page, #results-page { display: none; }

.quiz-layout {
  display: flex;
  gap: 24px;
  align-items: flex-start;
}

/* Sidebar nav */
.quiz-nav {
  width: 56px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
  max-height: 480px;
  overflow-y: auto;
  padding: 8px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.nav-dot {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--card);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text-secondary);
  font-weight: 500;
  flex-shrink: 0;
}
.nav-dot:hover { border-color: var(--accent); color: var(--accent); }
.nav-dot.current { background: var(--ink); color: #fff; border-color: var(--ink); }
.nav-dot.correct-dot { background: var(--correct); border-color: var(--correct); color: #fff; }
.nav-dot.incorrect-dot { background: var(--incorrect); border-color: var(--incorrect); color: #fff; }

.quiz-main {
  flex: 1;
  min-width: 0;
}

/* Top bar */
.quiz-topbar {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.progress-wrap {
  flex: 1;
  min-width: 150px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  border-radius: 10px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
.timer {
  font-family: "Playfair Display", monospace;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Question card */
.question-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 36px 40px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  min-height: 360px;
  transition: var(--transition);
  animation: fadeSlideIn 0.35s ease;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.q-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.q-type-badge {
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.q-type-badge.single { background: #e8f0fe; color: #1a56db; }
.q-type-badge.multiple { background: #fef3c7; color: #92400e; }
.q-type-badge.truefalse { background: #e0e7ff; color: #4338ca; }
.q-type-badge.fillblank { background: #fce4ec; color: #ad1457; }
.q-number {
  font-family: "Playfair Display", serif;
  font-size: 1rem;
  color: var(--text-secondary);
}
.q-text {
  font-size: 1.15rem;
  line-height: 1.7;
  color: var(--ink);
  margin-bottom: 28px;
  font-weight: 500;
}

/* Options */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.option-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  background: #fdfcfa;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.95rem;
  text-align: left;
  font-family: inherit;
  width: 100%;
}
.option-btn:hover {
  border-color: var(--accent);
  background: var(--accent-light);
  transform: translateX(4px);
}
.option-letter {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 0.85rem;
  flex-shrink: 0;
  transition: var(--transition);
  color: var(--text-secondary);
}
.option-btn.selected {
  border-color: var(--ink);
  background: #f0ece6;
}
.option-btn.selected .option-letter {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}
.option-btn.correct {
  border-color: var(--correct) !important;
  background: var(--correct-bg) !important;
}
.option-btn.correct .option-letter {
  background: var(--correct) !important;
  color: #fff !important;
  border-color: var(--correct) !important;
}
.option-btn.incorrect {
  border-color: var(--incorrect) !important;
  background: var(--incorrect-bg) !important;
}
.option-btn.incorrect .option-letter {
  background: var(--incorrect) !important;
  color: #fff !important;
  border-color: var(--incorrect) !important;
}
.option-btn.dimmed { opacity: 0.5; }

/* Fill-in-the-blank input */
.fillblank-input {
  width: 100%;
  padding: 16px 20px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1.05rem;
  font-family: inherit;
  background: #fdfcfa;
  transition: var(--transition);
  outline: none;
  color: var(--ink);
}
.fillblank-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(196,146,74,0.1);
}
.fillblank-input.confirmed {
  background: #f9fafb;
  border-color: var(--border);
  color: var(--text-secondary);
}
.fillblank-input.correct-input {
  border-color: var(--correct) !important;
  background: var(--correct-bg) !important;
  color: var(--correct) !important;
}
.fillblank-input.incorrect-input {
  border-color: var(--incorrect) !important;
  background: var(--incorrect-bg) !important;
  color: var(--incorrect) !important;
}

/* Short answer textarea */
.shortanswer-input {
  width: 100%;
  min-height: 120px;
  padding: 16px 20px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 1rem;
  font-family: inherit;
  background: #fdfcfa;
  transition: var(--transition);
  outline: none;
  color: var(--ink);
  resize: vertical;
  line-height: 1.7;
}
.shortanswer-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(196,146,74,0.1);
}
.shortanswer-input.confirmed {
  background: #f9fafb;
  border-color: var(--border);
  color: var(--text-secondary);
}
.shortanswer-input.correct-input {
  border-color: var(--correct) !important;
  background: var(--correct-bg) !important;
}
.shortanswer-input.incorrect-input {
  border-color: var(--incorrect) !important;
  background: var(--incorrect-bg) !important;
}

/* Feedback banner */
.feedback {
  margin-top: 20px;
  padding: 14px 20px;
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  font-weight: 500;
  animation: fadeSlideIn 0.3s ease;
  display: none;
}
.feedback.show { display: block; }
.feedback.correct-fb { background: var(--correct-bg); color: var(--correct); }
.feedback.incorrect-fb { background: var(--incorrect-bg); color: var(--incorrect); }

/* Quiz bottom bar */
.quiz-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  gap: 16px;
}

/* ── Results Page ── */
.results-hero {
  text-align: center;
  padding: 48px 40px;
}
.score-ring {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  margin: 0 auto 32px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
}
.score-ring::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 50%;
  padding: 8px;
  background: conic-gradient(
    var(--correct) calc(var(--score-pct, 0) * 1%),
    var(--border) calc(var(--score-pct, 0) * 1%)
  );
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 8px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 8px), #000 calc(100% - 8px));
}
.score-value {
  font-family: "Playfair Display", serif;
  font-size: 3.5rem;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}
.score-label {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 4px;
}

.stats-row {
  display: flex;
  gap: 24px;
  justify-content: center;
  margin-bottom: 40px;
  flex-wrap: wrap;
}
.stat-item {
  text-align: center;
  min-width: 80px;
}
.stat-value {
  font-family: "Playfair Display", serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--ink);
}
.stat-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.review-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  max-height: 500px;
  overflow-y: auto;
  padding-right: 8px;
}
.review-item {
  padding: 20px 24px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--card);
  transition: var(--transition);
}
.review-item:hover { box-shadow: var(--shadow); }
.review-item.r-correct { border-left: 4px solid var(--correct); }
.review-item.r-incorrect { border-left: 4px solid var(--incorrect); }
.review-q {
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  font-size: 0.95rem;
}
.review-info {
  font-size: 0.82rem;
  color: var(--text-secondary);
}
.review-info .correct-ans { color: var(--correct); font-weight: 600; }
.review-info .your-ans { color: var(--incorrect); }

.action-row {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 36px;
  flex-wrap: wrap;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .container { padding: 20px 16px; }
  .card, .question-card { padding: 24px 20px; }
  .app-header h1 { font-size: 1.8rem; }
  .quiz-layout { flex-direction: column-reverse; }
  .quiz-nav {
    flex-direction: row;
    width: 100%;
    max-height: none;
    overflow-x: auto;
    padding: 8px 4px;
    gap: 4px;
  }
  .nav-dot { width: 36px; height: 36px; font-size: 0.75rem; }
  .drop-zone { padding: 40px 24px; }
  .results-hero { padding: 32px 20px; }
  .score-ring { width: 140px; height: 140px; }
  .score-value { font-size: 2.5rem; }
  .stats-row { gap: 16px; }
}
</style>
</head>
<body>

<div class="container" id="app">

  <!-- ═══════════ UPLOAD PAGE ═══════════ -->
  <div id="upload-page">
    <header class="app-header">
      <h1>题库答题系统</h1>
      <p class="subtitle">Upload your question bank & start practicing</p>
    </header>

    <div class="card">
      <div class="drop-zone" id="dropZone">
        <div class="icon">&#128214;</div>
        <h3>点击上传或拖拽题库文件</h3>
        <p>支持 .docx / .txt / .json 格式</p>
        <input type="file" id="fileInput" accept=".docx,.txt,.json">
        <div class="format-hints">
          <span class="format-badge">Word 文档 .docx</span>
          <span class="format-badge">纯文本 .txt</span>
          <span class="format-badge">JSON .json</span>
        </div>
        <div class="file-name" id="fileName" style="display:none"></div>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <!-- Preview after parsing -->
      <div class="question-preview" id="questionPreview" style="display:none">
        <h4>已解析题目预览</h4>
        <div id="previewList"></div>
        <div class="preview-stats" id="previewStats"></div>
        <div style="margin-top: 20px; text-align: center;">
          <button class="btn btn-accent" onclick="startQuiz()">开始答题</button>
        </div>
      </div>

      <details class="paste-section" id="pasteSection">
        <summary>或者直接粘贴题目文本</summary>
        <textarea id="pasteArea" placeholder="粘贴题目内容，格式示例：&#10;&#10;一、单选题&#10;1. 中国共产党的成立时间是？&#10;A. 1921年7月1日&#10;B. 1921年7月23日&#10;C. 1922年7月1日&#10;D. 1922年7月23日&#10;答案：B&#10;&#10;2. 党的最高理想和最终目标是？&#10;A. 实现社会主义&#10;B. 实现共产主义&#10;C. 全面建成小康社会&#10;D. 实现现代化&#10;答案：B"></textarea>
        <button class="btn btn-secondary btn-sm" onclick="parsePastedText()">解析文本</button>
      </details>

      <details class="paste-section" id="rawTextSection" style="display:none;">
        <summary>查看/编辑原始解析文本</summary>
        <p style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:8px;">

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"
  onerror="document.getElementById('errorMsg').textContent='mammoth.js 加载失败，docx 解析不可用。请使用 .txt 或 .json 格式。';document.getElementById('errorMsg').style.display='block';">
</script>

<script>
// ═══════════════════════════════════════
//  State
// ═══════════════════════════════════════
const state = {
  questions: [],
  answers: {},        // { idx: [selected indices] }
  confirmed: {},      // { idx: true } — question is "locked in"
  currentIdx: 0,
  timerSec: 0,
  timerInterval: null,
  quizStarted: false
};

const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

// ═══════════════════════════════════════
//  DOM helpers
// ═══════════════════════════════════════
function $ (sel) { return document.querySelector(sel); }
function $$ (sel) { return document.querySelectorAll(sel); }

// ═══════════════════════════════════════
//  Question Parser
// ═══════════════════════════════════════
function parseQuestions (rawText) {
  const text = rawText.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
  if (!text) return [];

  // Try JSON first
  const jsonResult = tryParseJSON(text);
  if (jsonResult) return jsonResult;

  // Try structured text parsing
  return parseTextFormat(text);
}

function tryParseJSON (text) {
  try {
    const cleaned = text.replace(/^﻿/, '').trim();
    if (!cleaned.startsWith('[') && !cleaned.startsWith('{')) return null;
    let data = JSON.parse(cleaned);
    if (!Array.isArray(data)) {
      if (data.questions) data = data.questions;
      else if (data.data) data = data.data;
      else return null;
    }
    return data.map((item, i) => {
      let type = item.type || 'single';
      if (type === '单选' || type === '单选题') type = 'single';
      if (type === '多选' || type === '多选题') type = 'multiple';
      if (type === '判断' || type === '判断题') type = 'truefalse';

      return {
        id: i + 1,
        type,
        text: item.question || item.text || item.title || '',
        options: item.options || item.choices || [],
        answer: normalizeAnswer(item.answer || item.correct || item.key),
        explanation: item.explanation || item.reason || ''
      };
    });
  } catch { return null; }
}

function normalizeAnswer (ans) {
  if (ans === undefined || ans === null) return null; // null = not found
  if (typeof ans === 'number') return [ans];
  if (Array.isArray(ans)) return ans.map(a => typeof a === 'string' ? letterToIndex(a) : a);
  if (typeof ans === 'string') {
    const cleaned = ans.trim();
    // Check for multi-part answer first: "A,B,C" or "A、B、C" or "A B C"
    const parts = cleaned.split(/[,，、\s]+/).filter(Boolean);
    if (parts.length > 1) {
      const indices = parts.map(letterToIndex).filter(i => i >= 0);
      if (indices.length === parts.length) return indices;
    }
    // "ABC" — each char is a letter (like "ABCD" for multi-choice)
    const upper = cleaned.toUpperCase();
    if (upper.length > 1 && /^[A-Z]+$/.test(upper)) {
      return upper.split('').map(letterToIndex);
    }
    // Try to extract just the letter: "B. xxx" → "B", "B、xxx" → "B"
    const letterMatch = cleaned.match(/^([A-H])\b/i);
    if (letterMatch) {
      const single = letterToIndex(letterMatch[1]);
      if (single >= 0) return [single];
    }
    const idx = letterToIndex(upper);
    if (idx >= 0) return [idx];
    // Numeric answer
    const num = parseInt(cleaned);
    if (!isNaN(num)) return [num];
    // Text answer (for fillblank/shortanswer — shouldn't reach here normally)
    return null;
  }
  return null;
}

function letterToIndex (s) {
  const upper = s.trim().toUpperCase();
  if (upper.length === 1 && upper >= 'A' && upper <= 'Z') return upper.charCodeAt(0) - 65;
  return -1;
}

function parseTextFormat (text) {
  // ── First, check for tab-delimited format ──
  const lines = text.split('\n');
  if (lines.some(l => l.includes('\t'))) {
    return parseTabFormat(text, []);
  }

  // ── Detect compact one-line format ──
  // Pattern: "1、题目___。A opt1B opt2C opt3D opt4答案：X"
  const nonEmptyLines = lines.filter(l => l.trim());
  if (nonEmptyLines.length === 0) return [];

  // Check how many lines match the compact one-line pattern
  const compactPattern = /^\d+[、.．]\s*.+答案[：:]/;
  let compactMatches = 0;
  for (const line of nonEmptyLines) {
    if (compactPattern.test(line.trim())) compactMatches++;
  }

  // If most non-empty lines match compact format, use compact parser
  if (compactMatches >= nonEmptyLines.length * 0.5 && compactMatches >= 1) {
    return parseCompactFormat(text);
  }

  // ── Otherwise use standard section-based parsing ──
  const sectionTypes = [];
  const sectionPatterns = [
    { regex: /(?:^|\n)\s*[一二三四五六七八九十]+[、.．]\s*单[项选]|(?:^|\n)\s*单[项选择]题/i, type: 'single' },
    { regex: /(?:^|\n)\s*[一二三四五六七八九十]+[、.．]\s*多[项选]|(?:^|\n)\s*多[项选择]题/i, type: 'multiple' },
    { regex: /(?:^|\n)\s*[一二三四五六七八九十]+[、.．]\s*判[断]|(?:^|\n)\s*判断题/i, type: 'truefalse' },
    { regex: /(?:^|\n)\s*[一二三四五六七八九十]+[、.．]\s*填[空]|(?:^|\n)\s*填空题/i, type: 'fillblank' },
    { regex: /(?:^|\n)\s*[一二三四五六七八九十]+[、.．]\s*简[答]|(?:^|\n)\s*简答题/i, type: 'shortanswer' },
  ];
  for (const sp of sectionPatterns) {
    const m = text.match(sp.regex);
    if (m) sectionTypes.push({ type: sp.type, pos: m.index || 0 });
  }
  sectionTypes.sort((a, b) => a.pos - b.pos);

  return parseLineFormat(text, sectionTypes);
}

// ── Compact one-line format parser ──
// Format: "1、题目_____。A opt1B opt2C opt3D opt4答案：C"
function parseCompactFormat (text) {
  const questions = [];
  const lines = text.split('\n');
  let qNum = 0;

  function getSectionTypeFromLine(line) {
    if (/单[项选]|单选题/i.test(line)) return 'single';
    if (/多[项选]|多选题/i.test(line)) return 'multiple';
    if (/判[断]|判断题/i.test(line)) return 'truefalse';
    if (/填[空]|填空题/i.test(line)) return 'fillblank';
    if (/简[答]|简答题/i.test(line)) return 'shortanswer';
    return 'single';
  }

  let currentType = 'single';

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;

    // Section header
    if (/^[一二三四五六七八九十]+[、.．]/.test(line) &&
        /(?:单[项选]|多[项选]|判断|填空|简答)/i.test(line)) {
      currentType = getSectionTypeFromLine(line);
      continue;
    }

    // Must start with a number
    if (!/^\d+[、.．]/.test(line)) continue;

    // Find 答案 position
    const ansIdx = line.search(/答案[：:]/);
    const answer = ansIdx >= 0 ? line.substring(ansIdx).replace(/^答案[：:]\s*/, '').trim() : null;
    const beforeAnswer = ansIdx >= 0 ? line.substring(0, ansIdx) : line;

    // Remove question number
    const noNum = beforeAnswer.replace(/^\d+[、.．]\s*/, '');

    // Find where options start: first standalone [A-H] followed by space or Chinese
    // after the question part (which ends with 。or _____ or _____。）
    let optionsBlock = '';
    let qText = noNum;

    // Strategy: find the pattern "[A-H] " (letter + space) that marks the first option
    // This should appear after the question content ends
    const optStartMatch = noNum.match(/[。》」』］】）\)]$/);
    if (optStartMatch) {
      const endPos = optStartMatch.index + optStartMatch[0].length;
      const afterEnd = noNum.substring(endPos);
      const firstOpt = afterEnd.match(/([A-H])\s/);
      if (firstOpt && firstOpt.index !== undefined) {
        const optStart = endPos + firstOpt.index;
        qText = noNum.substring(0, optStart).trim();
        optionsBlock = noNum.substring(optStart);
      }
    }

    // Fallback: find first [A-H] followed by space that's after position ~10
    if (!optionsBlock) {
      const optMarkers = [];
      const re = /([A-H])\s/g;
      let m;
      while ((m = re.exec(noNum)) !== null) {
        optMarkers.push({ letter: m[1], pos: m.index });
      }
      // Options typically start with A, then B, C, D in sequence
      // Find the sequence A, B, C, D
      for (let i = 0; i < optMarkers.length - 1; i++) {
        const curr = optMarkers[i];
        const next = optMarkers[i + 1];
        if (curr.letter === 'A' && next.letter === 'B') {
          qText = noNum.substring(0, curr.pos).trim();
          optionsBlock = noNum.substring(curr.pos);
          break;
        }
      }
    }

    // Parse options from compact block
    const options = [];
    if (optionsBlock) {
      const optRegex = /([A-H])\s*(.+?)(?=[A-H]\s|$)/g;
      let m;
      while ((m = optRegex.exec(optionsBlock)) !== null) {
        options.push({ letter: m[1], text: m[2].trim() });
      }
    }

    if (options.length < 2) continue;

    // Determine type
    let finalType = currentType;
    if (currentType === 'single' && options.length === 2) {
      const optsText = options.map(o => o.text);
      if ((optsText[0] === '正确' || optsText[0] === '对' || optsText[0] === '√') &&
          (optsText[1] === '错误' || optsText[1] === '错' || optsText[1] === '×')) {
        finalType = 'truefalse';
      }
    }

    const normalizedAns = normalizeAnswer(answer);
    const finalAnswer = normalizedAns || [0];
    const cleanOpts = options.map((o, i) => ({
      letter: LETTERS[i],
      text: o.text.replace(/^[A-H][.、．)\s]+/, '').trim()
    }));

    qNum++;
    questions.push({
      id: qNum, type: finalType,
      text: qText || '(题目内容)',
      options: cleanOpts, answer: finalAnswer, explanation: ''
    });
  }

  return questions;
}

// ── Tab-delimited parser (docx table extraction) ──
function parseTabFormat (text, sectionTypes) {
  const questions = [];
  const lines = text.split('\n');
  let qNum = 0;
  let currentSection = 'single';

  function getSectionType(pos) {
    for (let i = sectionTypes.length - 1; i >= 0; i--) {
      if (sectionTypes[i].pos <= pos) return sectionTypes[i].type;
    }
    return 'single';
  }

  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;

    if (/^[一二三四五六七八九十]+[、.．]/.test(trimmed) &&
        /(?:单[项选]|多[项选]|判断|填空|简答)/i.test(trimmed)) {
      currentSection = getSectionType(text.indexOf(trimmed));
      continue;
    }

    const cols = trimmed.split('\t').map(c => c.trim()).filter(Boolean);
    if (cols.length < 2) continue;

    const numMatch = cols[0].match(/^(\d+)/);
    if (!numMatch) continue;

    const qText = cols[1] || '';

    // Last column: check if it's a standalone answer letter
    const lastCol = cols[cols.length - 1];
    let answerCol = null;
    if (/^[A-H]$/i.test(lastCol)) {
      answerCol = cols.length - 1;
    }

    // Parse option columns (excluding number, question, and answer)
    const options = [];
    const endIdx = answerCol !== null ? answerCol : cols.length;
    for (let i = 2; i < endIdx; i++) {
      const c = cols[i];
      let optLetter, optText;
      if (/^[A-H][.、．)\s]/.test(c)) {
        const pm = c.match(/^([A-H])[.、．)\s]+(.+)/);
        if (pm) { optLetter = pm[1]; optText = pm[2].trim(); }
        else { optLetter = c[0]; optText = c.substring(1).trim(); }
      } else if (/^[A-H]$/.test(c)) {
        optLetter = c;
        optText = c;
      } else {
        continue; // skip non-option columns
      }
      if (optLetter && optText) {
        options.push({ letter: optLetter, text: optText.replace(/^[A-H][.、．)\s]+/, '').trim() || optText });
      }
    }

    if (options.length >= 2) {
      const answer = answerCol !== null ? cols[answerCol] : null;
      const cleanOpts = options.map((o, i) => ({
        letter: LETTERS[i],
        text: o.text
      }));
      const normalizedAns = normalizeAnswer(answer);
      const finalAnswer = normalizedAns || [0];
      const qType = currentSection === 'fillblank' || currentSection === 'shortanswer' ? 'single' : currentSection;
      const finalType = qType === 'multiple' ? 'multiple' : 'single';

      qNum++;
      questions.push({
        id: qNum, type: finalType,
        text: qText || '(题目内容)',
        options: cleanOpts, answer: finalAnswer, explanation: ''
      });
    }
  }
  return questions;
}

// ── Line-based parser ──
function parseLineFormat (text, sectionTypes) {
  const questions = [];

  function getSectionType(pos) {
    for (let i = sectionTypes.length - 1; i >= 0; i--) {
      if (sectionTypes[i].pos <= pos) return sectionTypes[i].type;
    }
    return 'single';
  }

  // ── Step 1: Split text into question blocks ──
  const lines = text.split('\n');
  const blocks = [];
  let currentBlock = [];
  let inQuestion = false;
  let pendingNum = null; // question number on its own line

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) {
      if (currentBlock.length) { blocks.push(currentBlock); currentBlock = []; }
      inQuestion = false;
      pendingNum = null;
      continue;
    }

    // Question number alone on a line (e.g., "1" or "1.")
    if (!inQuestion && /^(\d+)[.、．)]?\s*$/.test(line)) {
      pendingNum = line;
      continue;
    }

    const qStart = /^(\d+)[.、．)\s]/.test(line);
    const optLine = /^[A-H][.、．)\s]/.test(line);
    const ansLine = /^(?:答案|正确答案|正确选项|参考答案)[：:是为]\s*/i.test(line);
    // Standalone answer letter: "B" or "A" on its own line
    const standaloneLetter = /^[A-H]$/i.test(line);

    if (qStart && !optLine) {
      if (currentBlock.length) blocks.push(currentBlock);
      currentBlock = [line];
      inQuestion = true;
      pendingNum = null;
    } else if (inQuestion) {
      // If we see a standalone answer letter at the end of a block
      if (standaloneLetter && currentBlock.length >= 2 && !ansLine) {
        currentBlock.push('答案：' + line.toUpperCase());
      } else {
        currentBlock.push(line);
      }
    } else if (pendingNum && !optLine && !ansLine) {
      // Previous line was a number, this is the question text
      currentBlock = [pendingNum + ' ' + line];
      inQuestion = true;
      pendingNum = null;
    } else {
      if (currentBlock.length) blocks.push(currentBlock);
      currentBlock = [line];
      pendingNum = null;
    }
  }
  if (currentBlock.length) blocks.push(currentBlock);

  // ── Step 2: Parse each block into a question ──
  let qNum = 0;
  for (const block of blocks) {
    if (block.length === 0) continue;
    const firstLine = block[0].trim();

    // Skip section headers
    if (/^[一二三四五六七八九十]+[、.．]/.test(firstLine) &&
        /(?:单[项选]|多[项选]|判断|填空|简答)/i.test(firstLine)) continue;

    // Calculate position for section type lookup
    const pos = text.indexOf(firstLine);
    const qType = getSectionType(pos >= 0 ? pos : 0);

    // Extract question text (handle "1. text" and "1 text" and "1、text")
    let qText = firstLine.replace(/^\d+[.、．)\s]+/, '').trim();
    // If question text is empty (number was on its own line), check next line
    if (!qText && block.length > 1) {
      qText = block[1].trim();
      // Remove remaining lines from block for option parsing
      block.splice(1, 1);
    }

    // ── Extract options and answer ──
    let options = [];
    let answer = null;
    let explanation = '';

    for (let i = 1; i < block.length; i++) {
      const bline = block[i].trim();

      // Answer line
      const ansMatch = bline.match(/^(?:答案|正确答案|正确选项|参考答案)[：:是为]\s*(.+)/i);
      if (ansMatch) {
        answer = ansMatch[1].trim();
        continue;
      }
      const explainMatch = bline.match(/^(?:解析|解释|说明)[：:]\s*(.+)/i);
      if (explainMatch) {
        explanation = explainMatch[1].trim();
        continue;
      }

      // Same-line multiple options: "A．xxx　　B．xxx　　C．xxx"
      const allOptMatches = bline.match(/[A-H][.、．)\s]+\S+/g);
      if (allOptMatches && allOptMatches.length >= 2) {
        const parts = bline.split(/\s*(?=[A-H][.、．)\s]+)/);
        for (const part of parts) {
          const pm = part.match(/^([A-H])[.、．)\s]+(.+)/);
          if (pm) options.push({ letter: pm[1], text: pm[2].trim() });
        }
        continue;
      }

      // Single option per line
      const optMatch = bline.match(/^([A-H])[.、．)\s]+(.+)/);
      if (optMatch) {
        options.push({ letter: optMatch[1], text: optMatch[2].trim() });
        continue;
      }

      // Standalone letter followed by text on next line (e.g., "A" then "xxx")
      if (/^[A-H]$/i.test(bline) && i + 1 < block.length) {
        const nextLine = block[i + 1].trim();
        if (!/^[A-H][.、．)\s]/.test(nextLine) && !/^[A-H]$/i.test(nextLine) &&
            !/^答案/.test(nextLine) && !/^解析/.test(nextLine)) {
          options.push({ letter: bline.toUpperCase(), text: nextLine });
          i++; // skip next line
          continue;
        }
      }

      // Inline answer in brackets
      const inlineAns = bline.match(/[（(]\s*([A-H]+)\s*[）)]/);
      if (inlineAns && !answer) {
        answer = inlineAns[1];
        continue;
      }
    }

    // Try to extract inline options from question text
    if (options.length === 0) {
      const compactCheck = qText.match(/[A-H][.、．)\s]+\S+/g);
      if (compactCheck && compactCheck.length >= 2) {
        const parts = qText.split(/\s*(?=[A-H][.、．)\s]+)/);
        const firstPart = parts.shift() || '';
        qText = firstPart.replace(/\s+$/, '').trim();
        for (const part of parts) {
          const pm = part.match(/^([A-H])[.、．)\s]+(.+)/);
          if (pm) options.push({ letter: pm[1], text: pm[2].trim() });
        }
      }
    }

    // Check question text for inline answer "题目（ B ）"
    if (!answer) {
      const qInlineAns = qText.match(/[（(]\s*([A-H]+)\s*[）)]/);
      if (qInlineAns) {
        answer = qInlineAns[1];
        qText = qText.replace(/[（(]\s*[A-H]*\s*[）)]/, '（ ）').trim();
      }
    }

    // ── Fill-in-the-blank / Short answer ──
    if (qType === 'fillblank' || qType === 'shortanswer') {
      qNum++;
      questions.push({
        id: qNum, type: qType, text: qText || '(题目内容)',
        options: [], answerText: [answer || ''], explanation
      });
      continue;
    }

    // ── True/false auto-detect ──
    if (qType === 'truefalse' && options.length === 0) {
      options = [{ letter: 'A', text: '正确' }, { letter: 'B', text: '错误' }];
    }

    if (options.length < 2) continue;

    const finalType = (qType === 'truefalse' && options.length === 2) ? 'truefalse'
      : (qType === 'multiple' ? 'multiple' : 'single');

    const normalizedAns = normalizeAnswer(answer);
    const finalAnswer = normalizedAns || [0];

    const cleanOpts = options.map((o, i) => ({
      letter: LETTERS[i],
      text: o.text.replace(/^[A-H][.、．)\s]+/, '').trim()
    }));

    qNum++;
    questions.push({
      id: qNum, type: finalType, text: qText || '(题目内容)',
      options: cleanOpts, answer: finalAnswer, explanation
    });
  }

  return questions;
}

// ═══════════════════════════════════════
//  File Handling
// ═══════════════════════════════════════
const dropZone = $('#dropZone');
const fileInput = $('#fileInput');
const errorMsg = $('#errorMsg');
const fileNameEl = $('#fileName');
const questionPreview = $('#questionPreview');
const previewList = $('#previewList');
const previewStats = $('#previewStats');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

function handleFile (file) {
  if (!file) return;
  errorMsg.style.display = 'none';
  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'json' || ext === 'txt') {
    const reader = new FileReader();
    reader.onload = () => {
      const text = reader.result;
      processParsedText(text);
      fileNameEl.textContent = '已加载: ' + file.name;
      fileNameEl.style.display = 'block';
    };
    reader.onerror = () => showError('文件读取失败');
    reader.readAsText(file);
  } else if (ext === 'docx') {
    if (typeof mammoth === 'undefined') {
      showError('mammoth.js 未加载，无法解析 docx。请尝试使用 .txt 或 .json 格式，或检查网络连接后刷新页面。');
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      const arrayBuffer = reader.result;
      mammoth.extractRawText({ arrayBuffer })
        .then(result => {
          const text = result.value;
          if (!text.trim()) {
            showError('未能从 docx 文件中提取到文字内容，请检查文件是否为空。');
            return;
          }
          processParsedText(text);
          fileNameEl.textContent = '已加载: ' + file.name;
          fileNameEl.style.display = 'block';
        })
        .catch(err => {
          showError('docx 解析失败: ' + err.message);
        });
    };
    reader.onerror = () => showError('文件读取失败');
    reader.readAsArrayBuffer(file);
  } else {
    showError('不支持的文件格式: .' + ext + '，请上传 .docx / .txt / .json 文件');
  }
}

function parsePastedText () {
  const text = $('#pasteArea').value.trim();
  if (!text) { showError('请粘贴题目内容后再解析'); return; }
  errorMsg.style.display = 'none';
  fileNameEl.textContent = '已加载: 粘贴的文本';
  fileNameEl.style.display = 'block';
  processParsedText(text);
}

let rawTextCache = '';
function processParsedText (text) {
  rawTextCache = text;
  const questions = parseQuestions(text);
  if (questions.length === 0) {
    showError('未能解析出题目，请检查格式。可展开"查看/编辑原始解析文本"查看和修改提取到的文本。');
    questionPreview.style.display = 'none';
    // Show raw text so user can debug
    $('#rawTextArea').value = text;
    $('#rawTextSection').style.display = 'block';
    return;
  }
  state.questions = questions;
  showPreview(questions);
  // Populate raw text section
  $('#rawTextArea').value = text;
  $('#rawTextSection').style.display = 'block';
}

function reparseRawText () {
  errorMsg.style.display = 'none';
  const text = $('#rawTextArea').value;
  processParsedText(text);
}

function showError (msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  questionPreview.style.display = 'none';
}

function showPreview (questions) {
  previewList.innerHTML = questions.slice(0, 20).map(q => {
    const typeLabels = { single: '单选', multiple: '多选', truefalse: '判断', fillblank: '填空', shortanswer: '简答' };
    return `<div class="preview-item">
      <span class="q-num">${q.id}.</span>
      <span>${q.text.substring(0, 60)}${q.text.length > 60 ? '...' : ''}</span>
      <span class="q-badge">${typeLabels[q.type] || '单选'}</span>
    </div>`;
  }).join('');
  if (questions.length > 20) {
    previewList.innerHTML += `<div class="preview-item" style="color:var(--text-secondary);justify-content:center;">
      ... 还有 ${questions.length - 20} 道题
    </div>`;
  }

  const typeCounts = {};
  questions.forEach(q => {
    const label = { single: '单选题', multiple: '多选题', truefalse: '判断题', fillblank: '填空题', shortanswer: '简答题' }[q.type] || '单选题';
    typeCounts[label] = (typeCounts[label] || 0) + 1;
  });

  previewStats.innerHTML = `
    <div class="preview-stat">共解析 <strong>${questions.length}</strong> 道题</div>
    ${Object.entries(typeCounts).map(([k, v]) =>
      `<div class="preview-stat"><strong>${v}</strong> ${k}</div>`
    ).join('')}
  `;

  questionPreview.style.display = 'block';
}

// ═══════════════════════════════════════
//  Quiz Engine
// ═══════════════════════════════════════
function startQuiz () {
  if (state.questions.length === 0) return;
  state.currentIdx = 0;
  state.answers = {};
  state.confirmed = {};
  state.timerSec = 0;
  state.quizStarted = true;

  $('#upload-page').style.display = 'none';
  $('#quiz-page').style.display = 'block';
  $('#results-page').style.display = 'none';

  buildNav();
  renderQuestion();
  startTimer();
  updateProgress();
  updateNavHighlight();

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startTimer () {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timerSec++;
    updateTimerDisplay();
  }, 1000);
}

function stopTimer () {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
}

function updateTimerDisplay () {
  const m = Math.floor(state.timerSec / 60);
  const s = state.timerSec % 60;
  $('#timerDisplay').textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function formatTime (sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function buildNav () {
  const nav = $('#quizNav');
  nav.innerHTML = state.questions.map((_, i) =>
    `<div class="nav-dot" data-idx="${i}" onclick="jumpTo(${i})">${i + 1}</div>`
  ).join('');
  $('#totalQNum').textContent = state.questions.length;
}

function updateNavHighlight () {
  const dots = $$('.nav-dot');
  dots.forEach((dot, i) => {
    dot.classList.remove('current', 'correct-dot', 'incorrect-dot');
    if (i === state.currentIdx) dot.classList.add('current');
    else if (state.confirmed[i]) {
      const q = state.questions[i];
      const userAns = state.answers[i] || [];
      const correct = isCorrect(q, userAns);
      dot.classList.add(correct ? 'correct-dot' : 'incorrect-dot');
    }
  });
}

function isCorrect (q, userAns) {
  if (q.type === 'fillblank' || q.type === 'shortanswer') {
    const correctText = (q.answerText?.[0] || '').trim().toLowerCase();
    const userText = ((userAns || [])[0] || '').trim().toLowerCase();
    // Exact match, or contains if answer is long
    if (correctText.length > 8 && userText.length > 0) {
      return userText.includes(correctText) || correctText.includes(userText);
    }
    return correctText === userText;
  }
  const correctAns = [...q.answer].sort().join(',');
  const ua = [...(userAns || [])].sort().join(',');
  return correctAns === ua;
}

function jumpTo (idx) {
  state.currentIdx = idx;
  renderQuestion();
  updateNavHighlight();
  updateProgress();
}

function prevQuestion () {
  if (state.currentIdx > 0) {
    state.currentIdx--;
    renderQuestion();
    updateNavHighlight();
    updateProgress();
  }
}

function nextQuestion () {
  if (state.currentIdx < state.questions.length - 1) {
    state.currentIdx++;
    renderQuestion();
    updateNavHighlight();
    updateProgress();
  }
}

function renderQuestion () {
  const q = state.questions[state.currentIdx];
  const typeLabels = { single: '单选题', multiple: '多选题', truefalse: '判断题', fillblank: '填空题', shortanswer: '简答题' };
  const isConfirmed = state.confirmed[state.currentIdx];
  const userAns = state.answers[state.currentIdx] || [];
  const isMulti = q.type === 'multiple';
  const isFillblank = q.type === 'fillblank';
  const isShortanswer = q.type === 'shortanswer';
  const isTextType = isFillblank || isShortanswer;

  const card = $('#questionCard');

  if (isTextType) {
    const userText = userAns.length > 0 ? userAns[0] : '';
    const correctText = q.answerText ? q.answerText[0] : '';
    const typeLabel = isFillblank ? '填空题' : '简答题';
    const inputId = isFillblank ? 'fillblankInput' : 'shortanswerInput';
    const placeholderText = isFillblank ? '请输入答案...' : '请输入你的回答...';

    if (isFillblank) {
      card.innerHTML = `
        <div class="q-header">
          <span class="q-type-badge fillblank">${typeLabel}</span>
          <span class="q-number">Question ${q.id}</span>
        </div>
        <div class="q-text">${q.id}. ${escapeHtml(q.text)}</div>
        <div style="margin-top:20px;">
          <input type="text"
            class="fillblank-input ${isConfirmed ? 'confirmed' : ''} ${isConfirmed ? (isCorrect(q, userAns) ? 'correct-input' : 'incorrect-input') : ''}"
            id="fillblankInput"
            placeholder="${placeholderText}"
            value="${escapeHtml(isConfirmed ? userText : '')}"
            ${isConfirmed ? 'disabled' : ''}
            autocomplete="off">
        </div>
        ${!isConfirmed
          ? `<div style="margin-top:16px;display:flex;align-items:center;gap:12px;">
              <p style="font-size:0.82rem;color:var(--text-secondary);margin:0;">输入答案后点击确认，或按 Enter 键</p>
              <button class="btn btn-accent btn-sm" id="confirmFillBtn" onclick="confirmFillBlank()">确认答案</button>
            </div>`
          : ''}
      `;
      if (!isConfirmed) {
        setTimeout(() => {
          const inp = $('#fillblankInput');
          if (inp) inp.focus();
        }, 100);
      }
    } else {
      card.innerHTML = `
        <div class="q-header">
          <span class="q-type-badge fillblank">${typeLabel}</span>
          <span class="q-number">Question ${q.id}</span>
        </div>
        <div class="q-text">${q.id}. ${escapeHtml(q.text)}</div>
        <div style="margin-top:20px;">
          <textarea
            class="shortanswer-input ${isConfirmed ? 'confirmed' : ''} ${isConfirmed ? (isCorrect(q, userAns) ? 'correct-input' : 'incorrect-input') : ''}"
            id="shortanswerInput"
            placeholder="${placeholderText}"
            ${isConfirmed ? 'disabled' : ''}>${isConfirmed ? escapeHtml(userText) : ''}</textarea>
        </div>
        ${!isConfirmed
          ? `<div style="margin-top:16px;display:flex;align-items:center;gap:12px;">
              <p style="font-size:0.82rem;color:var(--text-secondary);margin:0;">输入答案后点击确认，或按 Ctrl+Enter</p>
              <button class="btn btn-accent btn-sm" id="confirmFillBtn" onclick="confirmFillBlank()">确认答案</button>
            </div>`
          : ''}
      `;
      if (!isConfirmed) {
        setTimeout(() => {
          const ta = $('#shortanswerInput');
          if (ta) ta.focus();
        }, 100);
      }
    }
  } else {
    card.innerHTML = `
      <div class="q-header">
        <span class="q-type-badge ${q.type}">${typeLabels[q.type] || '单选题'}</span>
        <span class="q-number">Question ${q.id}</span>
      </div>
      <div class="q-text">${q.id}. ${escapeHtml(q.text)}</div>
      <div class="options-list">
        ${q.options.map((opt, i) => {
          const selected = userAns.includes(i);
          let cls = 'option-btn';
          if (isConfirmed) {
            if (q.answer.includes(i)) cls += ' correct';
            else if (selected) cls += ' incorrect';
            if (!q.answer.includes(i) && !selected) cls += ' dimmed';
          } else if (selected) {
            cls += ' selected';
          }
          return `<button class="${cls}" data-opt="${i}" ${isConfirmed ? 'disabled' : ''}>
            <span class="option-letter">${opt.letter}</span>
            <span>${escapeHtml(opt.text)}</span>
          </button>`;
        }).join('')}
      </div>
      ${isMulti && !isConfirmed
        ? `<div style="margin-top:16px;display:flex;align-items:center;gap:12px;">
            <p style="font-size:0.82rem;color:var(--text-secondary);margin:0;">可选择多个答案，选中后点击确认</p>
            <button class="btn btn-accent btn-sm" id="confirmMultiBtn" ${!userAns || userAns.length === 0 ? 'disabled' : ''} onclick="confirmMultiSelect()">确认选择</button>
          </div>`
        : ''}
    `;

    // Attach click handlers
    if (!isConfirmed) {
      card.querySelectorAll('.option-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          if (state.confirmed[state.currentIdx]) return;
          const optIdx = parseInt(btn.dataset.opt);
          selectOption(optIdx);
        });
      });
    }
  }

  // Show feedback if confirmed
  if (isConfirmed) {
    const correct = isCorrect(q, userAns);
    const fb = $('#feedback');
    fb.className = 'feedback show ' + (correct ? 'correct-fb' : 'incorrect-fb');
    if (isFillblank) {
      const correctText = q.answerText ? q.answerText[0] : '';
      fb.textContent = correct
        ? '✓ 回答正确！'
        : `✗ 回答错误，正确答案是：${correctText}`;
    } else {
      const correctLetters = q.answer.map(i => LETTERS[i]).join('');
      fb.textContent = correct
        ? '✓ 回答正确！'
        : `✗ 回答错误，正确答案是 ${correctLetters}`;
    }
    if (q.explanation) fb.textContent += ' — ' + q.explanation;
  } else {
    $('#feedback').className = 'feedback';
    $('#feedback').textContent = '';
  }

  // Update navigation buttons
  $('#prevBtn').style.visibility = state.currentIdx > 0 ? 'visible' : 'hidden';
  $('#nextBtn').style.visibility = state.currentIdx < state.questions.length - 1 ? 'visible' : 'hidden';

  // Show submit button
  const anyConfirmed = Object.keys(state.confirmed).length > 0;
  $('#submitBtn').style.display = anyConfirmed ? 'inline-flex' : 'none';

  $('#currentQNum').textContent = state.currentIdx + 1;
  updateProgress();
  updateNavHighlight();
}

function selectOption (optIdx) {
  const q = state.questions[state.currentIdx];
  if (state.confirmed[state.currentIdx]) return;

  if (q.type === 'multiple') {
    const current = state.answers[state.currentIdx] || [];
    const idx = current.indexOf(optIdx);
    if (idx >= 0) current.splice(idx, 1);
    else current.push(optIdx);
    state.answers[state.currentIdx] = current;
    // Re-render to update selection visuals (don't confirm yet)
    renderQuestionKeepFeedback();
  } else {
    // Single choice: select and immediately confirm
    state.answers[state.currentIdx] = [optIdx];
    state.confirmed[state.currentIdx] = true;
    renderQuestion();
    updateNavHighlight();

    // Auto-advance after a brief pause
    if (state.currentIdx < state.questions.length - 1) {
      setTimeout(() => {
        state.currentIdx++;
        renderQuestion();
        updateNavHighlight();
        updateProgress();
      }, 600);
    } else {
      updateProgress();
      checkAllConfirmed();
    }
  }
}

function renderQuestionKeepFeedback () {
  const userAns = state.answers[state.currentIdx] || [];
  const card = $('#questionCard');

  card.querySelectorAll('.option-btn').forEach(btn => {
    const optIdx = parseInt(btn.dataset.opt);
    btn.classList.toggle('selected', userAns.includes(optIdx));
  });

  const confirmBtn = $('#confirmMultiBtn');
  if (confirmBtn) confirmBtn.disabled = !userAns || userAns.length === 0;
}

// Double-click or a "confirm" button for multi-select
function confirmMultiSelect () {
  const q = state.questions[state.currentIdx];
  if (q.type !== 'multiple') return;
  const userAns = state.answers[state.currentIdx];
  if (!userAns || userAns.length === 0) return;

  state.confirmed[state.currentIdx] = true;
  renderQuestion();
  updateNavHighlight();
  checkAllConfirmed();

  if (state.currentIdx < state.questions.length - 1) {
    setTimeout(() => {
      state.currentIdx++;
      renderQuestion();
      updateNavHighlight();
      updateProgress();
    }, 800);
  }
}

function confirmFillBlank () {
  const q = state.questions[state.currentIdx];
  if (q.type !== 'fillblank' && q.type !== 'shortanswer') return;

  const input = $('#fillblankInput') || $('#shortanswerInput');
  const userText = input ? input.value.trim() : '';
  if (!userText) return; // don't confirm empty answers
  state.answers[state.currentIdx] = [userText];
  state.confirmed[state.currentIdx] = true;
  renderQuestion();
  updateNavHighlight();
  checkAllConfirmed();

  if (state.currentIdx < state.questions.length - 1) {
    setTimeout(() => {
      state.currentIdx++;
      renderQuestion();
      updateNavHighlight();
      updateProgress();
    }, 800);
  }
}

function checkAllConfirmed () {
  const anyAnswered = Object.keys(state.confirmed).length > 0;
  $('#submitBtn').style.display = anyAnswered ? 'inline-flex' : 'none';
}

function updateProgress () {
  const total = state.questions.length;
  const answered = Object.keys(state.confirmed).length;
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;

  $('#progressText').textContent = `第 ${state.currentIdx + 1}/${total} 题`;
  $('#answeredCount').textContent = `已答 ${answered}`;
  $('#progressFill').style.width = pct + '%';
  checkAllConfirmed();
}

function submitQuiz () {
  // Confirm any unanswered questions as wrong
  state.questions.forEach((q, i) => {
    if (!state.confirmed[i]) {
      state.answers[i] = state.answers[i] || [];
      state.confirmed[i] = true;
    }
  });
  showResults();
}

function showResults () {
  stopTimer();
  $('#quiz-page').style.display = 'none';
  $('#upload-page').style.display = 'none';
  $('#results-page').style.display = 'block';

  const total = state.questions.length;
  let correctCount = 0;
  let incorrectCount = 0;

  const reviewItems = state.questions.map((q, i) => {
    const userAns = state.answers[i] || [];
    const correct = isCorrect(q, userAns);
    if (correct) correctCount++;
    else incorrectCount++;

    const isTextType = q.type === 'fillblank' || q.type === 'shortanswer';
    const userDisplay = isTextType
      ? ((userAns[0] || '') || '未作答')
      : (userAns.map(idx => LETTERS[idx]).join('') || '未作答');
    const correctDisplay = isTextType
      ? (q.answerText?.[0] || '')
      : q.answer.map(idx => LETTERS[idx]).join('');

    return { q, userDisplay, correctDisplay, correct, index: i, isTextType };
  });

  const score = total > 0 ? Math.round((correctCount / total) * 100) : 0;
  const accuracy = total > 0 ? Math.round((correctCount / total) * 100) : 0;

  // Score ring
  const scoreRing = $('#scoreRing');
  scoreRing.style.setProperty('--score-pct', score);
  $('#scoreValue').textContent = score;

  // Stats
  $('#statCorrect').textContent = correctCount;
  $('#statIncorrect').textContent = incorrectCount;
  $('#statTime').textContent = formatTime(state.timerSec);
  $('#statAccuracy').textContent = accuracy + '%';

  // Review list
  $('#reviewList').innerHTML = reviewItems.map(item => `
    <div class="review-item ${item.correct ? 'r-correct' : 'r-incorrect'}">
      <div class="review-q">${item.index + 1}. ${escapeHtml(item.q.text)}</div>
      <div class="review-info">
        ${item.correct
          ? `你的答案: <span class="correct-ans">${escapeHtml(item.userDisplay)}</span> ✓`
          : `你的答案: <span class="your-ans">${escapeHtml(item.userDisplay || '未作答')}</span> &nbsp;|&nbsp; 正确答案: <span class="correct-ans">${escapeHtml(item.correctDisplay)}</span>`
        }
        ${item.q.explanation ? ` — ${escapeHtml(item.q.explanation)}` : ''}
      </div>
    </div>
  `).join('');

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retryQuiz () {
  state.currentIdx = 0;
  state.answers = {};
  state.confirmed = {};
  state.timerSec = 0;
  state.quizStarted = true;

  $('#quiz-page').style.display = 'block';
  $('#results-page').style.display = 'none';
  $('#upload-page').style.display = 'none';

  buildNav();
  renderQuestion();
  startTimer();
  updateProgress();
  updateNavHighlight();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function backToUpload () {
  stopTimer();
  state.questions = [];
  state.answers = {};
  state.confirmed = {};
  state.currentIdx = 0;
  state.timerSec = 0;
  state.quizStarted = false;

  $('#quiz-page').style.display = 'none';
  $('#results-page').style.display = 'none';
  $('#upload-page').style.display = 'block';
  $('#questionPreview').style.display = 'none';
  $('#fileName').style.display = 'none';
  $('#errorMsg').style.display = 'none';
  $('#pasteArea').value = '';

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escapeHtml (str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ═══════════════════════════════════════
//  Keyboard Navigation
// ═══════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (!state.quizStarted) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  const q = state.questions[state.currentIdx];
  const isConfirmed = state.confirmed[state.currentIdx];

  // Letter keys for option selection
  if (!isConfirmed && e.key.length === 1) {
    const letter = e.key.toUpperCase();
    const optIdx = LETTERS.indexOf(letter);
    if (optIdx >= 0 && optIdx < q.options.length) {
      selectOption(optIdx);
    }
  }

  // Enter for confirming multi-select or fillblank
  if (e.key === 'Enter' && !isConfirmed && (q.type === 'multiple' || q.type === 'fillblank')) {
    if (q.type === 'multiple') {
      const userAns = state.answers[state.currentIdx];
      if (userAns && userAns.length > 0) confirmMultiSelect();
    } else {
      confirmFillBlank();
    }
  }

  // Ctrl+Enter for confirming shortanswer (so Enter can still be used for newlines)
  if (e.key === 'Enter' && e.ctrlKey && !isConfirmed && q.type === 'shortanswer') {
    e.preventDefault();
    confirmFillBlank();
  }

  // Arrow keys for navigation
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); prevQuestion(); }
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); nextQuestion(); }
});
</script>
